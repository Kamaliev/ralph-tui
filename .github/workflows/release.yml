name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # Required for OIDC
  contents: write  # Required for creating GitHub Releases

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run build
      - run: npm publish

  build-binaries:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: darwin-arm64
          - os: ubuntu-latest
            platform: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Build standalone binary
        run: bun build --compile ./src/cli.tsx --outfile ralph-tui-${{ matrix.platform }}

      - name: Stage release archive
        run: |
          mkdir -p staging
          cp ralph-tui-${{ matrix.platform }} staging/ralph-tui
          cp -r assets staging/assets
          cp -r skills staging/skills
          cd staging && tar czf ../ralph-tui-${{ matrix.platform }}.tar.gz .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.platform }}
          path: |
            ralph-tui-${{ matrix.platform }}
            ralph-tui-${{ matrix.platform }}.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: [publish, build-binaries]
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --latest \
            binaries/ralph-tui-darwin-arm64 \
            binaries/ralph-tui-linux-x64 \
            binaries/ralph-tui-darwin-arm64.tar.gz \
            binaries/ralph-tui-linux-x64.tar.gz
        env:
          GH_TOKEN: ${{ github.token }}
